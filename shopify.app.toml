# Shopify App Configuration
# Replace YOUR_CLIENT_ID_HERE with your actual Shopify app Client ID
# Then run: shopify app deploy

client_id = "e1bde8232afcab4c37b12a9b29c3dde1"
name = "STYLYS APP"
application_url = "https://venerable-heliotrope-826d1c.netlify.app/embedded"
embedded = true

[access_scopes]
scopes = "read_products,read_product_listings,unauthenticated_read_product_listings,unauthenticated_read_product_tags,read_inventory"

[auth]
redirect_urls = [
  "https://stylysapp.com/connect-shopify",
  "https://venerable-heliotrope-826d1c.netlify.app/connect-shopify"
]

[webhooks]
api_version = "2025-10"

  [[webhooks.subscriptions]]
  topics = [
    "products/create",
    "products/update",
    "products/delete",
    "inventory_levels/update",
    "app/uninstalled"
  ]
  uri = "https://mggxvtfgakplzzpcclte.supabase.co/functions/v1/shopify-webhooks"

  # GDPR mandatory webhooks (customers/data_request, customers/redact, shop/redact)
  # must be configured in the Shopify Partners dashboard under Privacy webhooks,
  # not via TOML subscriptions — the CLI rejects them as invalid topics here.
