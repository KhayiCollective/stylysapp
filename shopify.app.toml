# Shopify App Configuration
# Replace YOUR_CLIENT_ID_HERE with your actual Shopify app Client ID
# Then run: shopify app deploy

client_id = "e1bde8232afcab4c37b12a9b29c3dde1"
name = "STYLYS APP"
handle = "stylys-app"
application_url = "https://stylysapp.vercel.app/embedded"
embedded = true

[access_scopes]
scopes = "read_products,read_product_listings,read_inventory,unauthenticated_read_product_listings,unauthenticated_read_product_tags"

[auth]
redirect_urls = [
  "https://stylysapp.vercel.app/connect-shopify",
  "https://stylysapp.com/connect-shopify"
]

[webhooks]
api_version = "2025-10"

  [[webhooks.subscriptions]]
  topics = [
    "products/create",
    "products/update",
    "products/delete",
    "inventory_levels/update",
    "app/uninstalled"
  ]
  uri = "https://mggxvtfgakplzzpcclte.supabase.co/functions/v1/shopify-webhooks"

