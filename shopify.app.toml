# Shopify App Configuration
# Replace YOUR_CLIENT_ID_HERE with your actual Shopify app Client ID
# Then run: shopify app deploy

client_id = "YOUR_CLIENT_ID_HERE"
name = "AI Stylist Platform"
application_url = "https://stylysapp.lovable.app"
embedded = false

[access_scopes]
scopes = "read_products,read_product_listings,unauthenticated_read_product_listings,unauthenticated_read_product_tags"

[auth]
redirect_urls = [
  "https://stylysapp.lovable.app/connect-shopify"
]

[webhooks]
api_version = "2025-10"

  [[webhooks.subscriptions]]
  topics = [
    "products/create",
    "products/update",
    "products/delete",
    "inventory_levels/update",
    "app/uninstalled"
  ]
  uri = "https://mggxvtfgakplzzpcclte.supabase.co/functions/v1/shopify-webhooks"

  [[webhooks.subscriptions]]
  topics = ["customers/data_request"]
  uri = "https://mggxvtfgakplzzpcclte.supabase.co/functions/v1/shopify-webhooks"

  [[webhooks.subscriptions]]
  topics = ["customers/redact"]
  uri = "https://mggxvtfgakplzzpcclte.supabase.co/functions/v1/shopify-webhooks"

  [[webhooks.subscriptions]]
  topics = ["shop/redact"]
  uri = "https://mggxvtfgakplzzpcclte.supabase.co/functions/v1/shopify-webhooks"
